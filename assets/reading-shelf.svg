<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="Currently reading: Atlas of AI, Unmasking AI, Fairness and Machine Learning, Automating Inequality, Weapons of Math Destruction">
  <defs>
    <linearGradient id="book1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="8%" stop-color="#1E3A5F"/>
      <stop offset="92%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F1E3A"/>
    </linearGradient>
    <linearGradient id="book2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7F1D1D"/>
      <stop offset="8%" stop-color="#B91C1C"/>
      <stop offset="92%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="book3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="8%" stop-color="#0F766E"/>
      <stop offset="92%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="book4" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="8%" stop-color="#B45309"/>
      <stop offset="92%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <linearGradient id="book5" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="8%" stop-color="#374151"/>
      <stop offset="92%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <style>
      .title { font-family: Georgia, 'IBM Plex Serif', serif; fill: #FDF8F0; font-weight: 500; }
      .author { font-family: 'Segoe UI', -apple-system, sans-serif; fill: #FDF8F0; opacity: 0.75; }
    </style>
  </defs>

  <!-- card background -->
  <rect x="0" y="0" width="900" height="300" rx="8" fill="#0A0F1C"/>

  <!-- caption -->
  <text x="30" y="34" font-family="'Courier New', monospace" font-size="11" fill="#E8E6E3" opacity="0.45" letter-spacing="2">CURRENTLY READING</text>
  <text x="30" y="52" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" fill="#E8E6E3" opacity="0.35" font-style="italic">Updated quarterly &#8212; see ai-ethics-research-log for notes</text>

  <!-- Book 1: Atlas of AI (tall) -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="130" height="200" fill="url(#book1)" stroke="#0A0F1C" stroke-width="1"/>
    <line x1="10" y1="8" x2="10" y2="192" stroke="#FDF8F0" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="120" y1="8" x2="120" y2="192" stroke="#0A0F1C" stroke-opacity="0.4" stroke-width="0.5"/>
    <g transform="translate(65,170) rotate(-90)">
      <text x="0" y="0" class="title" font-size="15">Atlas of AI</text>
    </g>
    <text x="65" y="188" class="author" font-size="9" text-anchor="middle" letter-spacing="0.5">K. CRAWFORD</text>
  </g>

  <!-- Book 2: Unmasking AI (slightly shorter) -->
  <g transform="translate(220, 82)">
    <rect x="0" y="0" width="130" height="188" fill="url(#book2)" stroke="#0A0F1C" stroke-width="1"/>
    <line x1="10" y1="8" x2="10" y2="180" stroke="#FDF8F0" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="120" y1="8" x2="120" y2="180" stroke="#0A0F1C" stroke-opacity="0.4" stroke-width="0.5"/>
    <g transform="translate(65,160) rotate(-90)">
      <text x="0" y="0" class="title" font-size="15">Unmasking AI</text>
    </g>
    <text x="65" y="178" class="author" font-size="9" text-anchor="middle" letter-spacing="0.5">J. BUOLAMWINI</text>
  </g>

  <!-- Book 3: Fairness and Machine Learning (tallest) -->
  <g transform="translate(380, 62)">
    <rect x="0" y="0" width="130" height="208" fill="url(#book3)" stroke="#0A0F1C" stroke-width="1"/>
    <line x1="10" y1="8" x2="10" y2="200" stroke="#FDF8F0" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="120" y1="8" x2="120" y2="200" stroke="#0A0F1C" stroke-opacity="0.4" stroke-width="0.5"/>
    <g transform="translate(55,185) rotate(-90)">
      <text x="0" y="0" class="title" font-size="13">Fairness &amp; ML</text>
    </g>
    <g transform="translate(75,185) rotate(-90)">
      <text x="0" y="0" class="author" font-size="9">BAROCAS HARDT NARAYANAN</text>
    </g>
    <text x="65" y="198" class="author" font-size="8" text-anchor="middle" letter-spacing="0.5">MIT PRESS</text>
  </g>

  <!-- Book 4: Automating Inequality -->
  <g transform="translate(540, 76)">
    <rect x="0" y="0" width="130" height="194" fill="url(#book4)" stroke="#0A0F1C" stroke-width="1"/>
    <line x1="10" y1="8" x2="10" y2="186" stroke="#FDF8F0" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="120" y1="8" x2="120" y2="186" stroke="#0A0F1C" stroke-opacity="0.4" stroke-width="0.5"/>
    <g transform="translate(55,170) rotate(-90)">
      <text x="0" y="0" class="title" font-size="13">Automating</text>
    </g>
    <g transform="translate(75,170) rotate(-90)">
      <text x="0" y="0" class="title" font-size="13">Inequality</text>
    </g>
    <text x="65" y="184" class="author" font-size="9" text-anchor="middle" letter-spacing="0.5">V. EUBANKS</text>
  </g>

  <!-- Book 5: Weapons of Math Destruction -->
  <g transform="translate(700, 68)">
    <rect x="0" y="0" width="130" height="202" fill="url(#book5)" stroke="#0A0F1C" stroke-width="1"/>
    <line x1="10" y1="8" x2="10" y2="194" stroke="#FDF8F0" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="120" y1="8" x2="120" y2="194" stroke="#0A0F1C" stroke-opacity="0.4" stroke-width="0.5"/>
    <g transform="translate(50,180) rotate(-90)">
      <text x="0" y="0" class="title" font-size="12">Weapons of Math</text>
    </g>
    <g transform="translate(70,180) rotate(-90)">
      <text x="0" y="0" class="title" font-size="12">Destruction</text>
    </g>
    <text x="65" y="192" class="author" font-size="9" text-anchor="middle" letter-spacing="0.5">C. O&#8217;NEIL</text>
  </g>

  <!-- shelf line -->
  <line x1="40" y1="274" x2="860" y2="274" stroke="url(#shelf)" stroke-width="1.5"/>
  <line x1="40" y1="277" x2="860" y2="277" stroke="url(#shelf)" stroke-width="0.5" opacity="0.4"/>
</svg>
