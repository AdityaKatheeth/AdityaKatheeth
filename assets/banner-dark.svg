<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="Aditya Katheeth — AI Engineer and Fairness Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="60%" stop-color="#121827"/>
      <stop offset="100%" stop-color="#1E1533"/>
    </linearGradient>
    <linearGradient id="curveA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="curveB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#bg)"/>

  <!-- scattered data points -->
  <g fill="#A78BFA" opacity="0.25">
    <circle cx="60" cy="190" r="1.2"/>
    <circle cx="140" cy="30" r="1"/>
    <circle cx="220" cy="210" r="1.3"/>
    <circle cx="310" cy="20" r="1"/>
    <circle cx="380" cy="200" r="1.2"/>
    <circle cx="1100" cy="40" r="1"/>
    <circle cx="1150" cy="190" r="1.2"/>
    <circle cx="40" cy="110" r="1"/>
    <circle cx="1160" cy="110" r="1.2"/>
  </g>

  <!-- Left: typography -->
  <g transform="translate(80, 0)">
    <text x="0" y="104" font-family="Georgia, 'IBM Plex Serif', serif" font-size="54" font-weight="500" fill="#E8E6E3" letter-spacing="-1">Aditya Katheeth</text>
    <line x1="0" y1="122" x2="52" y2="122" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="64" y="127" font-family="'Segoe UI', -apple-system, sans-serif" font-size="13" font-weight="500" fill="#A78BFA" letter-spacing="4">AI ENGINEER &#183; FAIRNESS RESEARCHER</text>
    <text x="0" y="168" font-family="'Segoe UI', -apple-system, sans-serif" font-size="15" font-weight="300" fill="#9CA3AF" font-style="italic">Production ML today &#8212; research for tomorrow.</text>
  </g>

  <!-- Right: ROC-by-group motif (disparate-impact visual cue) -->
  <g transform="translate(800, 40)">
    <!-- frame -->
    <rect x="0" y="0" width="320" height="160" fill="none" stroke="#E8E6E3" stroke-opacity="0.12" stroke-width="0.5"/>

    <!-- gridlines -->
    <g stroke="#E8E6E3" stroke-opacity="0.05" stroke-width="0.5">
      <line x1="0" y1="40" x2="320" y2="40"/>
      <line x1="0" y1="80" x2="320" y2="80"/>
      <line x1="0" y1="120" x2="320" y2="120"/>
      <line x1="80" y1="0" x2="80" y2="160"/>
      <line x1="160" y1="0" x2="160" y2="160"/>
      <line x1="240" y1="0" x2="240" y2="160"/>
    </g>

    <!-- diagonal (random classifier) -->
    <line x1="0" y1="160" x2="320" y2="0" stroke="#E8E6E3" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="3,4"/>

    <!-- curve A - stronger performance -->
    <path d="M 0,160 C 20,80 60,30 120,18 S 260,8 320,4" fill="none" stroke="url(#curveA)" stroke-width="2.2" stroke-linecap="round"/>

    <!-- curve B - disparate outcome -->
    <path d="M 0,160 C 40,130 90,85 150,60 S 280,20 320,14" fill="none" stroke="url(#curveB)" stroke-width="2.2" stroke-linecap="round"/>

    <!-- axis labels -->
    <text x="0" y="178" font-family="'Courier New', monospace" font-size="9" fill="#E8E6E3" opacity="0.45" letter-spacing="1">FPR</text>
    <g transform="translate(-14,88) rotate(-90)">
      <text x="0" y="0" font-family="'Courier New', monospace" font-size="9" fill="#E8E6E3" opacity="0.45" letter-spacing="1">TPR</text>
    </g>

    <!-- group markers -->
    <g font-family="'Courier New', monospace" font-size="9" letter-spacing="0.5">
      <circle cx="268" cy="12" r="2.5" fill="#A78BFA"/>
      <text x="276" y="15" fill="#A78BFA" opacity="0.9">Group A</text>
      <circle cx="268" cy="28" r="2.5" fill="#60A5FA"/>
      <text x="276" y="31" fill="#60A5FA" opacity="0.9">Group B</text>
    </g>

    <!-- title caption -->
    <text x="0" y="-14" font-family="'Courier New', monospace" font-size="10" fill="#E8E6E3" opacity="0.5" letter-spacing="1.5">ROC &#8212; by protected group</text>
  </g>
</svg>
